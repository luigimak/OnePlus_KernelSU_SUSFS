name: Build and Release OnePlus Kernels

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      make_release:
        description: 'Do you want to create a release?'
        required: true
        type: boolean
        default: false
      op_model:
        description: 'Select the OnePlus kernel to build'
        required: true
        type: choice
        options:
          - OP13-GLO
          - OP13-CN
          - OP13r
          - OP13S
          - OP13T
          - OP12
          - OP12r
          - OP11
          - OP11r
          - OP10pro
          - OP10t
          - OP-Nord-5
          - OP-NORD-4
          - OP-Nord-4-CE
          - OP-Nord-CE4-LITE
          - OPAce5Pro
          - OP-ACE-5
          - OP-Ace3-Pro
          - OP-ACE-3V
          - OP-ACE-2-PRO
          - OP-ACE-2
          - OP-OPEN
          - OP-PAD-3
          - OP-PAD-2-PRO
          - OP-PAD-2
          - OP-PAD-Pro
        default: OP11
      ksun_branch:
        description: 'Enter KernelSU Next Branch or commit hash (blank for stable tag)'
        required: true
        type: string
        default: next
      optimize_level:
        description: "Compiler optimization level"
        required: true
        type: choice
        options:
          - O2
          - O3
        default: O2
      android12-5_10_susfs_branch_or_commit:
        description: 'Enter SusFS Branch or commit hash for android12-5.10'
        type: string
        default: ''
      android13-5_10_susfs_branch_or_commit:
        description: 'Enter SusFS Branch or commit hash for android13-5.10'
        type: string
        default: ''
      android13-5_15_susfs_branch_or_commit:
        description: 'Enter SusFS Branch or commit hash for android13-5.15'
        type: string
        default: ''
      android14-5_15_susfs_branch_or_commit:
        description: 'Enter SusFS Branch or commit hash for android14-5.15'
        type: string
        default: ''
      android14-6_1_susfs_branch_or_commit:
        description: 'Enter SusFS Branch or commit hash for android14-6.1'
        type: string
        default: ''
      android15-6_6_susfs_branch_or_commit:
        description: 'Enter SusFS Branch or commit hash for android15-6.6'
        type: string
        default: ''

jobs:
  model-config:
    runs-on: ubuntu-latest
    outputs:
      model: ${{ steps.get-op-model.outputs.model }}
      soc: ${{ steps.get-op-model.outputs.soc }}
      branch: ${{ steps.get-op-model.outputs.branch }}
      manifest: ${{ steps.get-op-model.outputs.manifest }}
      android_version: ${{ steps.get-op-model.outputs.android_version }}
      kernel_version: ${{ steps.get-op-model.outputs.kernel_version }}
    steps:
      - name: Select OnePlus Model
        id: get-op-model
        run: |
          MODEL="${{ inputs.op_model }}"
          
          case "$MODEL" in
            "OP13-GLO")
              echo "model=OP13-GLO" >> $GITHUB_OUTPUT
              echo "soc=sun" >> $GITHUB_OUTPUT
              echo "branch=oneplus/sm8750" >> $GITHUB_OUTPUT
              echo "manifest=oneplus_13_global.xml" >> $GITHUB_OUTPUT
              echo "android_version=android15" >> $GITHUB_OUTPUT
              echo "kernel_version=6.6" >> $GITHUB_OUTPUT
              ;;
            "OP13-CN")
              echo "model=OP13-CN" >> $GITHUB_OUTPUT
              echo "soc=sun" >> $GITHUB_OUTPUT
              echo "branch=oneplus/sm8750" >> $GITHUB_OUTPUT
              echo "manifest=oneplus_13.xml" >> $GITHUB_OUTPUT
              echo "android_version=android15" >> $GITHUB_OUTPUT
              echo "kernel_version=6.6" >> $GITHUB_OUTPUT
              ;;
            "OP13r")
              echo "model=OP13r" >> $GITHUB_OUTPUT
              echo "soc=pineapple" >> $GITHUB_OUTPUT
              echo "branch=oneplus/sm8650" >> $GITHUB_OUTPUT
              echo "manifest=oneplus_13r.xml" >> $GITHUB_OUTPUT
              echo "android_version=android14" >> $GITHUB_OUTPUT
              echo "kernel_version=6.1" >> $GITHUB_OUTPUT
              ;;
            "OP13S")
              echo "model=OP13S" >> $GITHUB_OUTPUT
              echo "soc=sun" >> $GITHUB_OUTPUT
              echo "branch=oneplus/sm8750" >> $GITHUB_OUTPUT
              echo "manifest=oneplus_13s.xml" >> $GITHUB_OUTPUT
              echo "android_version=android15" >> $GITHUB_OUTPUT
              echo "kernel_version=6.6" >> $GITHUB_OUTPUT
              ;;
            "OP13T")
              echo "model=OP13T" >> $GITHUB_OUTPUT
              echo "soc=sun" >> $GITHUB_OUTPUT
              echo "branch=oneplus/sm8750" >> $GITHUB_OUTPUT
              echo "manifest=oneplus_13t.xml" >> $GITHUB_OUTPUT
              echo "android_version=android15" >> $GITHUB_OUTPUT
              echo "kernel_version=6.6" >> $GITHUB_OUTPUT
              ;;
            "OP12")
              echo "model=OP12" >> $GITHUB_OUTPUT
              echo "soc=pineapple" >> $GITHUB_OUTPUT
              echo "branch=oneplus/sm8650" >> $GITHUB_OUTPUT
              echo "manifest=oneplus12_v.xml" >> $GITHUB_OUTPUT
              echo "android_version=android14" >> $GITHUB_OUTPUT
              echo "kernel_version=6.1" >> $GITHUB_OUTPUT
              ;;
            "OP12r")
              echo "model=OP12r" >> $GITHUB_OUTPUT
              echo "soc=kalama" >> $GITHUB_OUTPUT
              echo "branch=oneplus/sm8550" >> $GITHUB_OUTPUT
              echo "manifest=oneplus_12r_v.xml" >> $GITHUB_OUTPUT
              echo "android_version=android13" >> $GITHUB_OUTPUT
              echo "kernel_version=5.15" >> $GITHUB_OUTPUT
              ;;
            "OP11")
              echo "model=OP11" >> $GITHUB_OUTPUT
              echo "soc=kalama" >> $GITHUB_OUTPUT
              echo "branch=oneplus/sm8550" >> $GITHUB_OUTPUT
              echo "manifest=oneplus_11_v.xml" >> $GITHUB_OUTPUT
              echo "android_version=android13" >> $GITHUB_OUTPUT
              echo "kernel_version=5.15" >> $GITHUB_OUTPUT
              ;;
            "OP11r")
              echo "model=OP11r" >> $GITHUB_OUTPUT
              echo "soc=waipio" >> $GITHUB_OUTPUT
              echo "branch=oneplus/sm8475" >> $GITHUB_OUTPUT
              echo "manifest=oneplus_11r_v.xml" >> $GITHUB_OUTPUT
              echo "android_version=android12" >> $GITHUB_OUTPUT
              echo "kernel_version=5.10" >> $GITHUB_OUTPUT
              ;;
            "OP10pro")
              echo "model=OP10pro" >> $GITHUB_OUTPUT
              echo "soc=waipio" >> $GITHUB_OUTPUT
              echo "branch=oneplus/sm8450" >> $GITHUB_OUTPUT
              echo "manifest=oneplus_10_pro_v.xml" >> $GITHUB_OUTPUT
              echo "android_version=android12" >> $GITHUB_OUTPUT
              echo "kernel_version=5.10" >> $GITHUB_OUTPUT
              ;;
            "OP10t")
              echo "model=OP10t" >> $GITHUB_OUTPUT
              echo "soc=waipio" >> $GITHUB_OUTPUT
              echo "branch=oneplus/sm8475" >> $GITHUB_OUTPUT
              echo "manifest=oneplus_10t_v.xml" >> $GITHUB_OUTPUT
              echo "android_version=android12" >> $GITHUB_OUTPUT
              echo "kernel_version=5.10" >> $GITHUB_OUTPUT
              ;;
            "OP-Nord-5")
              echo "model=OP-Nord-5" >> $GITHUB_OUTPUT
              echo "soc=cliffs" >> $GITHUB_OUTPUT
              echo "branch=oneplus/sm8635" >> $GITHUB_OUTPUT
              echo "manifest=oneplus_nord_5.xml" >> $GITHUB_OUTPUT
              echo "android_version=android14" >> $GITHUB_OUTPUT
              echo "kernel_version=6.1" >> $GITHUB_OUTPUT
              ;;
            "OP-NORD-4")
              echo "model=OP-NORD-4" >> $GITHUB_OUTPUT
              echo "soc=pineapple" >> $GITHUB_OUTPUT
              echo "branch=oneplus/sm7675" >> $GITHUB_OUTPUT
              echo "manifest=oneplus_nord_4_v.xml" >> $GITHUB_OUTPUT
              echo "android_version=android14" >> $GITHUB_OUTPUT
              echo "kernel_version=6.1" >> $GITHUB_OUTPUT
              ;;
            "OP-Nord-4-CE")
              echo "model=OP-Nord-4-CE" >> $GITHUB_OUTPUT
              echo "soc=crow" >> $GITHUB_OUTPUT
              echo "branch=oneplus/sm7550" >> $GITHUB_OUTPUT
              echo "manifest=oneplus_nord_ce4_v.xml" >> $GITHUB_OUTPUT
              echo "android_version=android13" >> $GITHUB_OUTPUT
              echo "kernel_version=5.15" >> $GITHUB_OUTPUT
              ;;
            "OP-Nord-CE4-LITE")
              echo "model=OP-Nord-CE4-LITE" >> $GITHUB_OUTPUT
              echo "soc=blair" >> $GITHUB_OUTPUT
              echo "branch=oneplus/sm6375" >> $GITHUB_OUTPUT
              echo "manifest=oneplus_nord_ce4_lite_5g_v.xml" >> $GITHUB_OUTPUT
              echo "android_version=android14" >> $GITHUB_OUTPUT
              echo "kernel_version=6.1" >> $GITHUB_OUTPUT
              ;;
            "OPAce5Pro")
              echo "model=OPAce5Pro" >> $GITHUB_OUTPUT
              echo "soc=sun" >> $GITHUB_OUTPUT
              echo "branch=oneplus/sm8750" >> $GITHUB_OUTPUT
              echo "manifest=oneplus_ace5_pro.xml" >> $GITHUB_OUTPUT
              echo "android_version=android15" >> $GITHUB_OUTPUT
              echo "kernel_version=6.6" >> $GITHUB_OUTPUT
              ;;
            "OP-ACE-5")
              echo "model=OP-ACE-5" >> $GITHUB_OUTPUT
              echo "soc=pineapple" >> $GITHUB_OUTPUT
              echo "branch=oneplus/sm8650" >> $GITHUB_OUTPUT
              echo "manifest=oneplus_ace5.xml" >> $GITHUB_OUTPUT
              echo "android_version=android14" >> $GITHUB_OUTPUT
              echo "kernel_version=6.1" >> $GITHUB_OUTPUT
              ;;
            "OP-Ace3-Pro")
              echo "model=OP-Ace3-Pro" >> $GITHUB_OUTPUT
              echo "soc=pineapple" >> $GITHUB_OUTPUT
              echo "branch=oneplus/sm8650" >> $GITHUB_OUTPUT
              echo "manifest=oneplus_ace3_pro_v.xml" >> $GITHUB_OUTPUT
              echo "android_version=android14" >> $GITHUB_OUTPUT
              echo "kernel_version=6.1" >> $GITHUB_OUTPUT
              ;;
            "OP-ACE-3V")
              echo "model=OP-ACE-3V" >> $GITHUB_OUTPUT
              echo "soc=pineapple" >> $GITHUB_OUTPUT
              echo "branch=oneplus/sm7675" >> $GITHUB_OUTPUT
              echo "manifest=oneplus_ace_3v_v.xml" >> $GITHUB_OUTPUT
              echo "android_version=android14" >> $GITHUB_OUTPUT
              echo "kernel_version=6.1" >> $GITHUB_OUTPUT
              ;;
            "OP-ACE-2-PRO")
              echo "model=OP-ACE-2-PRO" >> $GITHUB_OUTPUT
              echo "soc=kalama" >> $GITHUB_OUTPUT
              echo "branch=oneplus/sm8550" >> $GITHUB_OUTPUT
              echo "manifest=oneplus_ace2_pro_v.xml" >> $GITHUB_OUTPUT
              echo "android_version=android13" >> $GITHUB_OUTPUT
              echo "kernel_version=5.15" >> $GITHUB_OUTPUT
              ;;
            "OP-ACE-2")
              echo "model=OP-ACE-2" >> $GITHUB_OUTPUT
              echo "soc=waipio" >> $GITHUB_OUTPUT
              echo "branch=oneplus/sm8475" >> $GITHUB_OUTPUT
              echo "manifest=oneplus_ace2_v.xml" >> $GITHUB_OUTPUT
              echo "android_version=android12" >> $GITHUB_OUTPUT
              echo "kernel_version=5.10" >> $GITHUB_OUTPUT
              ;;
            "OP-OPEN")
              echo "model=OP-OPEN" >> $GITHUB_OUTPUT
              echo "soc=kalama" >> $GITHUB_OUTPUT
              echo "branch=oneplus/sm8550" >> $GITHUB_OUTPUT
              echo "manifest=oneplus_open_v.xml" >> $GITHUB_OUTPUT
              echo "android_version=android13" >> $GITHUB_OUTPUT
              echo "kernel_version=5.15" >> $GITHUB_OUTPUT
              ;;
            "OP-PAD-3")
              echo "model=OP-PAD-3" >> $GITHUB_OUTPUT
              echo "soc=sun" >> $GITHUB_OUTPUT
              echo "branch=oneplus/sm8750" >> $GITHUB_OUTPUT
              echo "manifest=oneplus_pad_3.xml" >> $GITHUB_OUTPUT
              echo "android_version=android15" >> $GITHUB_OUTPUT
              echo "kernel_version=6.6" >> $GITHUB_OUTPUT
              ;;
            "OP-PAD-2-PRO")
              echo "model=OP-PAD-2-PRO" >> $GITHUB_OUTPUT
              echo "soc=sun" >> $GITHUB_OUTPUT
              echo "branch=oneplus/sm8750" >> $GITHUB_OUTPUT
              echo "manifest=oneplus_pad_2_pro.xml" >> $GITHUB_OUTPUT
              echo "android_version=android15" >> $GITHUB_OUTPUT
              echo "kernel_version=6.6" >> $GITHUB_OUTPUT
              ;;
            "OP-PAD-2")
              echo "model=OP-PAD-2" >> $GITHUB_OUTPUT
              echo "soc=pineapple" >> $GITHUB_OUTPUT
              echo "branch=oneplus/sm8650" >> $GITHUB_OUTPUT
              echo "manifest=oneplus_pad2_v.xml" >> $GITHUB_OUTPUT
              echo "android_version=android14" >> $GITHUB_OUTPUT
              echo "kernel_version=6.1" >> $GITHUB_OUTPUT
              ;;
            "OP-PAD-Pro")
              echo "model=OP-PAD-Pro" >> $GITHUB_OUTPUT
              echo "soc=pineapple" >> $GITHUB_OUTPUT
              echo "branch=oneplus/sm8650" >> $GITHUB_OUTPUT
              echo "manifest=oneplus_pad_pro_v.xml" >> $GITHUB_OUTPUT
              echo "android_version=android14" >> $GITHUB_OUTPUT
              echo "kernel_version=6.1" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "Invalid or unsupported model: $MODEL"
              exit 1
              ;;
          esac

  build-batch-1:
    needs: model-config
    name: build-batch-1 (${{ needs.model-config.outputs.model }}, ${{ needs.model-config.outputs.soc }}, ${{ needs.model-config.outputs.branch }}, ${{ needs.model-config.outputs.manifest }}, ${{ needs.model-config.outputs.android_version }}, ${{ needs.model-config.outputs.kernel_version }}, ${{ inputs.ksun_branch }})
    runs-on: ubuntu-latest
    steps:
      - name: Select Appropriate SusFS Branch
        id: get-susfs-branch
        run: |
          KERNEL_STRING="${{ needs.model-config.outputs.android_version }}-${{ needs.model-config.outputs.kernel_version }}"
          
          SUSFS_BRANCH=""

          case "$KERNEL_STRING" in
            "android12-5.10")
              SUSFS_BRANCH="${{ inputs.android12-5_10_susfs_branch_or_commit }}"
              ;;
            "android13-5.10")
              SUSFS_BRANCH="${{ inputs.android13-5_10_susfs_branch_or_commit }}"
              ;;
            "android13-5.15")
              SUSFS_BRANCH="${{ inputs.android13-5_15_susfs_branch_or_commit }}"
              ;;
            "android14-5.15")
              SUSFS_BRANCH="${{ inputs.android14-5_15_susfs_branch_or_commit }}"
              ;;
            "android14-6.1")
              SUSFS_BRANCH="${{ inputs.android14-6_1_susfs_branch_or_commit }}"
              ;;
            "android15-6.6")
              SUSFS_BRANCH="${{ inputs.android15-6_6_susfs_branch_or_commit }}"
              ;;
            *)
              echo "Invalid kernel version or unsupported: $KERNEL_STRING"
              exit 1
              ;;
          esac
          
          echo "susfs_branch=$SUSFS_BRANCH" >> $GITHUB_OUTPUT

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Kernel
        uses: WildKernels/OnePlus_KernelSU_SUSFS/.github/actions@main
        with:
          model: ${{ needs.model-config.outputs.model }}
          soc: ${{ needs.model-config.outputs.soc }}
          branch: ${{ needs.model-config.outputs.branch }}
          manifest: ${{ needs.model-config.outputs.manifest }}
          ksun_branch: ${{ inputs.ksun_branch }}
          susfs_commit_hash_or_branch: ${{ steps.get-susfs-branch.outputs.susfs_branch }}
          optimize_level: ${{ inputs.optimize_level }}

  trigger-release:
    needs:
      - build-batch-1
    runs-on: ubuntu-latest
    if: ${{ inputs.make_release }}
    env:
      REPO_OWNER: ${{ github.repository_owner }}
      REPO_NAME: ${{ github.event.repository.name }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_NAME: '*TEST BUILD* OnePlus Kernels With KernelSU Next & SUSFS v1.5.11 *TEST BUILD*'
      RELEASE_NOTES: |
        This release contains KernelSU Next and SUSFS v1.5.11
        
        Module: 
        -> https://github.com/sidex15/ksu_module_susfs

        Non-Official Managers:
        -> https://github.com/KernelSU-Next/KernelSU-Next

        Features:
        [+] KernelSU-Next / WildKSU Manager Support
        [+] SUSFS v1.5.11
        [+] Wireguard Support
        [+] Magic Mount Support
        [+] Ptrace message leak fix for kernels < 5.16
        [+] Manual Hooks [scope_min_manual_hooks_v1.4]
        [+] CONFIG_TMPFS_XATTR Support [Mountify Support]
        [+] BBR v1 Support.
        [+] HMBIRD scx support for OnePlus 13 & OnePlus Ace 5 Pro.
        [+] Baseband Guard Support (BBG).

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Generate and Create New Tag
        run: |
          BASE_TAG="v1.5.11-r0"
          LATEST_TAG=$(gh api repos/$REPO_OWNER/$REPO_NAME/tags --jq '.[0].name')
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="$BASE_TAG"
          else
            LATEST_TAG=$(printf "%s\n%s\n" "$LATEST_TAG" "$BASE_TAG" | sort -rV | head -n1)
          fi
          NEW_TAG=$(echo "$LATEST_TAG" | awk -F'-r' '{suffix=$2; if (!suffix) suffix=0; suffix++; printf "%s-r%d", $1, suffix}')
          echo "New tag: $NEW_TAG"
          echo "NEW_TAG=${NEW_TAG}" >> $GITHUB_ENV
          git tag $NEW_TAG
          git push origin $NEW_TAG

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./downloaded-artifacts

      - name: Create GitHub Release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ env.NEW_TAG }}
          prerelease: true
          release_name: ${{ env.RELEASE_NAME }}
          body: ${{ env.RELEASE_NOTES }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Assets Dynamically
        run: |
          for file in ./downloaded-artifacts/kernel-*/*; do
              if [ -d "$file" ]; then
                  continue
              fi
              echo "Uploading $file..."
              gh release upload ${{ env.NEW_TAG }} "$file"
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ env.NEW_TAG }}

      - name: Display Files Uploaded
        run: |
          echo "GitHub release created with the following files:"
          ls ./downloaded-artifacts/**/*
